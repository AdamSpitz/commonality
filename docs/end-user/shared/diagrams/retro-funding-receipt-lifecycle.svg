<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="1040" height="460" fill="#f8fafc"/>

  <!-- Title -->
  <text x="520" y="52" text-anchor="middle" font-size="29" font-weight="700" fill="#0f172a">Life of a reimbursement claim</text>
  <text x="520" y="82" text-anchor="middle" font-size="16" fill="#475569">An early contribution creates an at-cost claim; its non-transferable recognition receipt remains.</text>

  <!-- 4 stage cards: x = 60, 305, 550, 795 ; width 185 -->
  <!-- MINT -->
  <g filter="url(#soft)"><rect x="60" y="150" width="185" height="170" rx="12" fill="#ffffff" stroke="#bfdbfe"/></g>
  <text x="152" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb" letter-spacing="1">1 · MINT</text>
  <circle cx="152" cy="228" r="26" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="152" y="235" text-anchor="middle" font-size="22">🎟️</text>
  <text x="152" y="284" text-anchor="middle" font-size="13" fill="#0f172a">scout funds early,</text>
  <text x="152" y="302" text-anchor="middle" font-size="13" fill="#0f172a">a receipt is issued</text>

  <!-- HOLD -->
  <g filter="url(#soft)"><rect x="305" y="150" width="185" height="170" rx="12" fill="#ffffff" stroke="#e2e8f0"/></g>
  <text x="397" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b" letter-spacing="1">2 · HOLD</text>
  <circle cx="397" cy="228" r="26" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="397" y="235" text-anchor="middle" font-size="22">⏳</text>
  <text x="397" y="284" text-anchor="middle" font-size="13" fill="#0f172a">scout carries the</text>
  <text x="397" y="302" text-anchor="middle" font-size="13" fill="#0f172a">risk; work happens</text>

  <!-- REIMBURSE -->
  <g filter="url(#soft)"><rect x="550" y="150" width="185" height="170" rx="12" fill="#ffffff" stroke="#fcd34d"/></g>
  <text x="642" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706" letter-spacing="1">3 · DONATE</text>
  <circle cx="642" cy="228" r="26" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="642" y="235" text-anchor="middle" font-size="22">🤝</text>
  <text x="642" y="284" text-anchor="middle" font-size="13" fill="#0f172a">later donor closes</text>
  <text x="642" y="302" text-anchor="middle" font-size="13" fill="#0f172a">the loop pro-rata</text>

  <!-- WITHDRAW -->
  <g filter="url(#soft)"><rect x="795" y="150" width="185" height="170" rx="12" fill="#ffffff" stroke="#fca5a5"/></g>
  <text x="887" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626" letter-spacing="1">4 · WITHDRAW</text>
  <circle cx="887" cy="228" r="26" fill="#fef2f2" stroke="#fca5a5"/>
  <text x="887" y="235" text-anchor="middle" font-size="22">🔥</text>
  <text x="887" y="284" text-anchor="middle" font-size="13" fill="#0f172a">scout gets back</text>
  <text x="887" y="302" text-anchor="middle" font-size="13" fill="#0f172a">at most what they gave</text>

  <!-- arrows between cards -->
  <path d="M245 235 L303 235" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar2)"/>
  <path d="M490 235 L548 235" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar2)"/>
  <path d="M735 235 L793 235" fill="none" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ar2)"/>

  <!-- outstanding counter -->
  <rect x="300" y="364" width="440" height="56" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#soft)"/>
  <text x="380" y="398" text-anchor="middle" font-size="14" fill="#475569">reimbursement</text>
  <text x="520" y="400" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">$66 → $65</text>
  <text x="670" y="398" text-anchor="middle" font-size="14" fill="#94a3b8">outstanding → $0</text>
</svg>
