<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 480" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs><clipPath id="bc"><rect x="80" y="190" width="880" height="64" rx="12"/></clipPath></defs>
  <rect width="1040" height="480" fill="#f8fafc"/>
  <text x="520" y="46" text-anchor="middle" font-size="28" font-weight="700" fill="#0f172a">It&#39;s one pot of money — watch who ends up paying for it</text>
  <text x="520" y="74" text-anchor="middle" font-size="15" fill="#475569">The bar fills once (the work gets paid for), then changes colour as the early risk-takers are bought out.</text>
  <rect x="330" y="92" width="380" height="40" rx="20" fill="#ffffff" stroke="#e2e8f0"/>  <circle cx="352" cy="112" r="7" fill="#f59e0b">
    <animate attributeName="fill" dur="20s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.33;0.84" values="#f59e0b;#2563eb;#16a34a"/>
  </circle>
  <text x="370" y="117" font-size="16" font-weight="600" fill="#0f172a" opacity="1">Awaiting funding…
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.30;0.33;0.97;1" values="1;1;0;0;1"/>
  </text>
  <text x="370" y="117" font-size="16" font-weight="600" fill="#0f172a" opacity="0">Funded — work underway
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.30;0.33;0.40;0.43;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="370" y="117" font-size="16" font-weight="600" fill="#0f172a" opacity="0">Delivered — and proven
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.40;0.43;0.52;0.55;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="370" y="117" font-size="16" font-weight="600" fill="#0f172a" opacity="0">Buying out the early backers…
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.52;0.55;0.84;0.87;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="370" y="117" font-size="16" font-weight="600" fill="#0f172a" opacity="0">Fully &amp; altruistically funded
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.84;0.87;0.97;1" values="0;0;1;1;0"/>
  </text>

  <g clip-path="url(#bc)">
    <rect x="80" y="190" width="880" height="64" fill="#ffffff"/>
    <rect x="80" y="190" height="64" width="0" fill="#ea7317"><animate attributeName="width" dur="20s" repeatCount="indefinite" keyTimes="0;0.33;0.995;1" values="0;880;880;0"/></rect>
    <rect x="80" y="190" height="64" width="0" fill="#16a34a"><animate attributeName="width" dur="20s" repeatCount="indefinite" keyTimes="0;0.52;0.84;0.995;1" values="0;0;880;880;0"/></rect>
    <line x1="168" y1="200" x2="168" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="256" y1="200" x2="256" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="344" y1="200" x2="344" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="432" y1="200" x2="432" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="520" y1="200" x2="520" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="608" y1="200" x2="608" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="696" y1="200" x2="696" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="784" y1="200" x2="784" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="872" y1="200" x2="872" y2="244" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  </g>
  <rect x="80" y="190" width="880" height="64" rx="12" fill="none" stroke="#cbd5e1"/>
  <text x="80" y="229" text-anchor="middle" font-size="22" opacity="0">🔥
    <animate attributeName="x" dur="20s" repeatCount="indefinite" keyTimes="0;0.52;0.84;1" values="80;80;960;960"/>
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.53;0.57;0.83;0.85;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="520" y="354" text-anchor="middle" font-size="15" fill="#0f172a" opacity="0"><tspan font-weight="700">66</tspan> receipts outstanding
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.33;0.55;1" values="0;1;1;0"/>
  </text>
  <text x="520" y="354" text-anchor="middle" font-size="15" fill="#0f172a" opacity="0"><tspan font-weight="700">44</tspan> receipts outstanding
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.55;0.57;0.66;0.68;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="520" y="354" text-anchor="middle" font-size="15" fill="#0f172a" opacity="0"><tspan font-weight="700">22</tspan> receipts outstanding
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.66;0.68;0.78;0.80;1" values="0;0;1;1;0;0"/>
  </text>
  <text x="520" y="354" text-anchor="middle" font-size="15" fill="#0f172a" opacity="0"><tspan font-weight="700">0</tspan> receipts outstanding
    <animate attributeName="opacity" dur="20s" repeatCount="indefinite" keyTimes="0;0.78;0.80;0.97;1" values="0;0;1;1;0"/>
  </text>
  <!-- legend -->
  <rect x="250" y="286" width="22" height="22" rx="5" fill="#ea7317"/>
  <text x="282" y="303" font-size="14" fill="#334155">Work paid for — but the early backers still hold the receipts</text>
  <rect x="250" y="318" width="22" height="22" rx="5" fill="#16a34a"/>
  <text x="282" y="335" font-size="14" fill="#334155"><tspan font-weight="700">Bought out</tspan> — funded purely by people who want nothing back (the goal)</text>

  <!-- caption -->
  <rect x="80" y="362" width="880" height="58" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
  <text x="520" y="386" text-anchor="middle" font-size="14" fill="#166534">No second pot is created. Retroactive funding doesn&#39;t add money — it <tspan font-weight="700">changes whose money it ultimately was.</tspan></text>
  <text x="520" y="407" text-anchor="middle" font-size="13" fill="#15803d">Green is the finish line, and it can&#39;t even start until the project has proven itself — which is why retro funders wait.</text>
</svg>
