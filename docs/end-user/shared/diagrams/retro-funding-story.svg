<text x="80" y="410" font-size="12" font-weight="700" fill="#64748b">FUNDING</text>
<text x="230" y="410" font-size="12" fill="#ea7317">orange = paid for, backers still owed</text>
<text x="550" y="410" font-size="12" fill="#16a34a">green = backers bought out (the goal)</text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="1.00">A builder is ready — but the work needs funding to start.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.055;0.070;1.000" values="1.00;1.00;0.00;0.00"/></text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="0.00">Early backers show up and fund the project up front.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.070;0.085;0.290;0.305;1.000" values="0.00;0.00;1.00;1.00;0.00;0.00"/></text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="0.00">Funded! Now the work can actually happen.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.305;0.320;0.350;0.365;1.000" values="0.00;0.00;1.00;1.00;0.00;0.00"/></text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="0.00">The playground gets built.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.365;0.380;0.550;0.565;1.000" values="0.00;0.00;1.00;1.00;0.00;0.00"/></text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="0.00">Done — and proven. The builder's paid; the early backers are still owed.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.565;0.580;0.660;0.675;1.000" values="0.00;0.00;1.00;1.00;0.00;0.00"/></text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="0.00">Grateful families pay the early backers back — and the kids move in.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.675;0.690;0.900;0.915;1.000" values="0.00;0.00;1.00;1.00;0.00;0.00"/></text>
<text x="520" y="488" text-anchor="middle" font-size="15" font-weight="600" fill="#334155" opacity="0.00">Fully funded by the community. Risk-takers made whole; nobody's owed.<animate attributeName="opacity" dur="24s" repeatCount="indefinite" keyTimes="0.000;0.915;0.930;0.985;1.000" values="0.00;0.00;1.00;1.00;0.00"/></text>
