<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#444"/>
    </marker>
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f4eb6"/>
      <stop offset="50%" stop-color="#8a4fb0"/>
      <stop offset="100%" stop-color="#c0392b"/>
    </linearGradient>
  </defs>

  <!-- spectrum bar along the bottom -->
  <rect x="60" y="505" width="780" height="8" rx="4" fill="url(#spectrum)" opacity="0.7"/>
  <text x="60"  y="535" font-size="13" fill="#666">left</text>
  <text x="800" y="535" font-size="13" fill="#666">right</text>

  <!-- vertical axis hint -->
  <text x="28" y="290" font-size="13" fill="#999" transform="rotate(-90 28 290)">mediator's work &#8594;</text>

  <!-- passive roofline: nudged positions align to form the peak -->
  <polyline points="312,250 450,120 588,250"
            fill="none" stroke="#bbb" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- nudge arrows: moderate -> nudged (nearly straight up; just a rephrase) -->
  <line x1="300" y1="365" x2="310" y2="262" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="600" y1="365" x2="590" y2="262" stroke="#444" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- THE SPECTRUM AS IT ALREADY EXISTS (all on one row; mediator did no work here) -->
  <!-- extremes -->
  <circle cx="90"  cy="380" r="11" fill="#1f4eb6" opacity="0.55"/>
  <text x="90" y="412" font-size="13" fill="#888" text-anchor="middle">extreme left</text>
  <circle cx="810" cy="380" r="11" fill="#c0392b" opacity="0.55"/>
  <text x="810" y="412" font-size="13" fill="#888" text-anchor="middle">extreme right</text>
  <!-- moderates -->
  <circle cx="300" cy="380" r="13" fill="#3a6fd8"/>
  <text x="300" y="412" font-size="14" fill="#333" text-anchor="middle">moderate left</text>
  <circle cx="600" cy="380" r="13" fill="#d65745"/>
  <text x="600" y="412" font-size="14" fill="#333" text-anchor="middle">moderate right</text>

  <!-- NUDGED MODERATES (same position, rephrased; directly above) -->
  <circle cx="310" cy="250" r="12" fill="#3a6fd8" opacity="0.85"/>
  <text x="310" y="232" font-size="13" fill="#555" text-anchor="middle">nudged left</text>
  <circle cx="590" cy="250" r="12" fill="#d65745" opacity="0.85"/>
  <text x="590" y="232" font-size="13" fill="#555" text-anchor="middle">nudged right</text>

  <!-- COMMON GROUND (peak) -->
  <circle cx="450" cy="120" r="17" fill="#2e9e5b"/>
  <text x="450" y="92" font-size="16" font-weight="bold" fill="#1d7a43" text-anchor="middle">common ground</text>
</svg>
