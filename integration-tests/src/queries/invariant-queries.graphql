# GraphQL queries used by integration test invariant checks.
# These query the indexer GraphQL API for consistency verification.
# Prefixed with "Invariant" to avoid name collisions with SDK queries.

# --- assertBeliefCountsMatch ---

query InvariantGetStatementBelieverCount($id: String!) {
  statements(cidV1: $id) {
    cidV1
    believerCount
  }
}

query InvariantGetStatementDisbelieverCount($id: String!) {
  statements(cidV1: $id) {
    cidV1
    disbelieverCount
  }
}

# NOTE: filter key is `statementId` (not `statementCid`) per the schema
query InvariantGetBelievers($statementId: String!) {
  beliefss(where: { statementId: $statementId, beliefState: 1 }) {
    items {
      user {
        id
      }
      beliefState
    }
  }
}

query InvariantGetDisbelievers($statementId: String!) {
  beliefss(where: { statementId: $statementId, beliefState: 2 }) {
    items {
      user {
        id
      }
      beliefState
    }
  }
}

# --- checkOrphanedBeliefs ---

query InvariantGetAllActiveBeliefs {
  beliefss(where: { beliefState_not: 0 }) {
    items {
      user {
        id
      }
      statementId
      beliefState
    }
  }
}

query InvariantCheckStatementExists($id: String!) {
  statements(cidV1: $id) {
    cidV1
  }
}

query InvariantCheckUserExists($id: String!) {
  users(id: $id) {
    id
  }
}

# --- checkOrphanedImplications ---

query InvariantGetAllImplications {
  implicationss {
    items {
      attester {
        id
      }
      fromStatementCid
      toStatementCid
    }
  }
}

query InvariantCheckAttesterExists($id: String!) {
  attesters(id: $id) {
    id
  }
}
