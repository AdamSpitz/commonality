# Render deployment configuration for Commonality services
# See https://render.com/docs/blueprint-spec

databases:
  - name: commonality-indexer-db
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  # Indexer
  - type: web
    name: commonality-indexer
    env: docker
    rootDir: indexer
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PONDER_SCRIPT
        value: start
      - key: DATABASE_URL
        fromDatabase:
          name: commonality-indexer-db
          property: connectionString
      - key: DATABASE_SCHEMA
        value: public
      - key: PONDER_CHAIN
        sync: false  # Set in Render dashboard: base-sepolia or mainnet
      - key: PONDER_RPC_URL_84532
        sync: false  # Secret: RPC provider URL (contains API key)
      - key: PONDER_RPC_URL_1
        sync: false  # Secret: RPC provider URL (contains API key)
      - key: START_BLOCK
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: BELIEFS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: ASSURANCE_CONTRACT_FACTORY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: ERC1155_FACTORY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: MARKETPLACE_FACTORY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: DELEGATABLE_NOTES_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: NOTE_INTENT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: ALIGNMENT_ATTESTATIONS_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: MUTABLE_REF_UPDATER_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: NUDGE_PUBLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CONTENT_REGISTRY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CHANNEL_REGISTRY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CHANNEL_ESCROW_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CREATOR_CONTRACT_FACTORY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
    healthCheckPath: /graphql
    autoDeploy: true
    plan: standard

  # Bundled AI service host (Bundle A — Attesters)
  - type: web
    name: commonality-service-host-attesters
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: service-host/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVICE_HOST_PORT
        value: 3000
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: IPFS_API
        value: https://ipfs.io/api/v0
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs
      - key: IMPLICATION_ATTESTER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: IMPLICATION_ATTESTER_PAYMENT_ADDRESS
        value: "0x021b3C90931CAdDa12C0dCaB0407A622d717b02C"
      - key: IMPLICATION_ATTESTER_TRUSTED_FINDER_KEY
        sync: false  # Set in Render dashboard
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CONTENT_ATTESTER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: CONTENT_ATTESTER_PAYMENT_ADDRESS
        value: "0x12F89237E0E96419283801bEc3151415974e5F94"
      - key: CONTENT_ATTESTER_TRUSTED_FINDER_KEY
        sync: false  # Set in Render dashboard
      - key: ALIGNMENT_ATTESTATIONS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: ALIGNMENT_TOPIC_STATEMENT_CID
        sync: false  # Set in Render dashboard after pinning topic statement to IPFS
      - key: CONTENT_ATTESTER_NAME
        value: noninflammatory-neutral
      - key: CONTENT_ATTESTER_PROMPT_TEMPLATE
        value: "Evaluate whether this content supports the configured topic: {content}"
      - key: BEAT_AGENT_ENABLED
        value: "true"
      - key: BEAT_AGENT_PRIVATE_KEY
        sync: false  # Set in Render dashboard (generated by scripts/generate-wallets.mjs)
      - key: BEAT_AGENT_PAYMENT_ADDRESS
        value: "0xC1ACe62974Fb276B1902250ba3C78A6b5504B3CE"
      - key: BEAT_AGENT_TRUSTED_FINDER_KEY
        sync: false  # Set in Render dashboard (generated by scripts/generate-wallets.mjs)
      - key: BEAT_AGENT_BEAT_ID
        value: us-politics
      - key: BEAT_AGENT_NAME
        value: us-politics-civility
      - key: BEAT_AGENT_PURPOSES
        value: civility_attestation,content_discovery,source_management
      - key: BEAT_AGENT_BEAT_DEFINITION_JSON
        value: '{"beatId":"us-politics","purposes":["civility_attestation"],"sources":[]}'
      - key: BEAT_AGENT_PROMPT_TEMPLATE
        value: "Evaluate US-politics content: {content}"
      - key: BEAT_AGENT_INGESTION_STATE_FILE
        value: /data/beat-agent/us-politics.ingestion.json
      - key: BEAT_AGENT_MEMORY_FILE
        value: /data/beat-agent/us-politics.memory.json
      - key: BEAT_AGENT_EVALUATION_LOG_FILE
        value: /data/beat-agent/us-politics.evaluations.jsonl
      - key: BEAT_AGENT_METRICS_LOG_FILE
        value: /data/beat-agent/us-politics.metrics.jsonl
      - key: BEAT_AGENT_WORKER_POLL_INTERVAL_MS
        value: 300000
      - key: BEAT_AGENT_LLM_EXTRACTION_ENABLED
        value: "true"
      - key: BEAT_AGENT_FINDER_ENABLED
        value: "false"
      - key: BEAT_AGENT_FINDER_STATE_FILE
        value: /data/beat-agent/us-politics.finder.json
      - key: BEAT_AGENT_FINDER_ATTESTER_URL
        value: https://attesters.testnet.commonality.works/beat-agent/evaluate-content
      - key: BEAT_AGENT_BEAT_KEYWORDS
        value: politics,policy,democrat,republican,liberal,conservative,bipartisan,civility,persuasion,good faith,common ground
      - key: BEAT_AGENT_PLATFORM_API_URL
        value: https://platform-api.testnet.commonality.works
      - key: BEAT_AGENT_MINIMUM_CONFIDENCE
        value: medium
      - key: BEAT_AGENT_ESTIMATED_INPUT_TOKENS
        value: 5000
      - key: BEAT_AGENT_ESTIMATED_OUTPUT_TOKENS
        value: 700
      - key: X_API_BEARER_TOKEN
        sync: false  # Required for Twitter/X beat ingestion
      - key: SERVICE_MARGIN_PERCENT
        value: 20
      - key: ETH_USD_PRICE
        value: 3000
      - key: GAS_PRICE_MULTIPLIER
        value: 1.2
      - key: IMPLICATION_ATTESTER_ESTIMATED_INPUT_TOKENS
        value: 1000
      - key: IMPLICATION_ATTESTER_ESTIMATED_OUTPUT_TOKENS
        value: 200
      - key: CONTENT_ATTESTER_ESTIMATED_INPUT_TOKENS
        value: 2500
      - key: CONTENT_ATTESTER_ESTIMATED_OUTPUT_TOKENS
        value: 400
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 10
      - key: IMPLICATION_FINDER_ENABLED
        value: "false"
      - key: CONTENT_FINDER_ENABLED
        value: "false"
      - key: IMPLICATION_GRAPH_NUDGER_ENABLED
        value: "false"
      - key: BRIDGE_CREATOR_ENABLED
        value: "false"
      - key: EXPLORER_CURATOR_ENABLED
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
    plan: standard
    disk:
      name: commonality-attester-data
      mountPath: /data
      sizeGB: 1

  # Platform API Service (content-funding channel resolution + content-attester queuing)
  - type: web
    name: commonality-platform-api
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: platform-api-service/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ALLOWED_ORIGINS
        value: "https://commonality.testnet.commonality.works,https://lazygiving.testnet.commonality.works,https://alignment.testnet.commonality.works,https://tally.testnet.commonality.works,https://content-funding.testnet.commonality.works,https://civility.testnet.commonality.works,https://common-sense-majority.testnet.commonality.works,https://conceptspace.testnet.commonality.works,https://commonality.testnet.commonality.eth.limo,https://lazygiving.testnet.commonality.eth.limo,https://alignment.testnet.commonality.eth.limo,https://tally.testnet.commonality.eth.limo,https://content-funding.testnet.commonality.eth.limo,https://civility.testnet.commonality.eth.limo,https://common-sense-majority.testnet.commonality.eth.limo,https://conceptspace.testnet.commonality.eth.limo"
      - key: COMMONALITY_TWITTER_HANDLE
        value: "@commonality"
      - key: CLAIM_PAGE_BASE_URL
        value: "https://content-funding.testnet.commonality.works/#/claim"
      - key: X_API_BEARER_TOKEN
        sync: false  # Set in Render dashboard (required for Twitter features)
      - key: YOUTUBE_API_KEY
        sync: false  # Set in Render dashboard (required for YouTube features)
      - key: VERIFIER_PRIVATE_KEY
        sync: false  # Set in Render dashboard (required for /verify/confirm; generated by scripts/generate-wallets.mjs)
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard (required for on-chain submission)
      - key: CHANNEL_REGISTRY_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CHANNEL_VERIFIER_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: CHAIN_ID
        value: 84532
      - key: SUBMIT_VERIFICATION_TX
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Bundled AI service host (Bundle B — Workers)
  - type: web
    name: commonality-service-host-workers
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: service-host/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVICE_HOST_PORT
        value: 3000
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: INDEXER_URL
        value: https://indexer.testnet.commonality.works
      - key: EVENT_CACHE_URL
        value: https://indexer.testnet.commonality.works
      - key: IPFS_API
        value: https://ipfs.io/api/v0
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io/ipfs
      - key: PLATFORM_API_URL
        value: https://platform-api.testnet.commonality.works
      - key: CONTENT_FINDER_PLATFORM_API_URL
        value: https://platform-api.testnet.commonality.works
      - key: CONTENT_FINDER_SUBMISSIONS_API_URL
        value: https://platform-api.testnet.commonality.works/content-submission
      - key: CONTENT_FINDER_ATTESTER_URL
        value: https://attesters.testnet.commonality.works/content-attester
      - key: CONTENT_FINDER_ATTESTER_FINDER_KEY
        sync: false  # Set in Render dashboard
      - key: IMPLICATION_FINDER_ATTESTER_URL
        value: https://attesters.testnet.commonality.works/implication-attester
      - key: IMPLICATION_FINDER_ATTESTER_FINDER_KEY
        sync: false  # Set in Render dashboard
      - key: BELIEFS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: NUDGE_PUBLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set from deployments/base-sepolia.env after deployment
      - key: IMPLICATION_GRAPH_NUDGER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: BRIDGE_CREATOR_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: EXPLORER_CURATOR_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: BRIDGE_CREATOR_COMMONALITY_STATEMENTS
        sync: false  # Optional: comma-separated pre-configured commonality statement texts
      - key: EXPLORER_CURATOR_STREAM
        value: fundable-project-explorer
      - key: EXPLORER_CURATOR_INTERVAL_MS
        value: 21600000  # 6 hours
      - key: EXPLORER_CURATOR_NAME
        value: Fundable Project Explorer
      - key: EXPLORER_CURATOR_DESCRIPTION
        value: Curates a map of fundable project areas and personalizes suggestions
      - key: EXPLORER_CURATOR_SOURCE_TYPE
        value: explorer-curator
      - key: EXPLORER_CURATOR_VERSION
        value: 0.1.0
      - key: BRIDGE_CREATOR_NAME
        value: Bridge Creator
      - key: BRIDGE_CREATOR_DESCRIPTION
        value: Creates synthesized bridge statements from moderate positions
      - key: BRIDGE_CREATOR_SOURCE_TYPE
        value: bridge-creator
      - key: BRIDGE_CREATOR_VERSION
        value: 0.1.0
      - key: IMPLICATION_GRAPH_NUDGER_NAME
        value: Implication Graph Nudger
      - key: IMPLICATION_GRAPH_NUDGER_DESCRIPTION
        value: Suggests statements based on the implication graph
      - key: IMPLICATION_GRAPH_NUDGER_SOURCE_TYPE
        value: implication-graph
      - key: IMPLICATION_GRAPH_NUDGER_VERSION
        value: 0.1.0
      - key: IMPLICATION_FINDER_POLL_INTERVAL_MS
        value: 30000
      - key: IMPLICATION_FINDER_TOP_N_STATEMENTS
        value: 20
      - key: IMPLICATION_FINDER_MIN_BELIEVER_THRESHOLD
        value: 2
      - key: CONTENT_FINDER_POLL_INTERVAL_MS
        value: 30000
      - key: IMPLICATION_ATTESTER_ENABLED
        value: "false"
      - key: CONTENT_ATTESTER_ENABLED
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

# Note: Deploy by pushing to your Git repository and connecting it to Render.
#
# Secrets to set in Render dashboard per service:
# commonality-service-host-attesters:
#   ETHEREUM_RPC_URL, OPENROUTER_API_KEY,
#   IMPLICATION_ATTESTER_PRIVATE_KEY, IMPLICATION_ATTESTER_PAYMENT_ADDRESS, IMPLICATION_ATTESTER_TRUSTED_FINDER_KEY, IMPLICATIONS_CONTRACT_ADDRESS,
#   CONTENT_ATTESTER_PRIVATE_KEY, CONTENT_ATTESTER_PAYMENT_ADDRESS, CONTENT_ATTESTER_TRUSTED_FINDER_KEY, ALIGNMENT_ATTESTATIONS_CONTRACT_ADDRESS,
#   ALIGNMENT_TOPIC_STATEMENT_CID, CONTENT_ATTESTER_NAME, CONTENT_ATTESTER_PROMPT_TEMPLATE,
#   BEAT_AGENT_PRIVATE_KEY, BEAT_AGENT_PAYMENT_ADDRESS, BEAT_AGENT_TRUSTED_FINDER_KEY, BEAT_AGENT_BEAT_DEFINITION_JSON,
#   BEAT_AGENT_PROMPT_TEMPLATE, X_API_BEARER_TOKEN
# platform-api-service: CORS_ALLOWED_ORIGINS, CLAIM_PAGE_BASE_URL, X_API_BEARER_TOKEN, YOUTUBE_API_KEY, VERIFIER_PRIVATE_KEY, CHANNEL_VERIFIER_ADDRESS (+ optionally ETHEREUM_RPC_URL, CHANNEL_REGISTRY_ADDRESS if enabling on-chain submission)
# commonality-service-host-workers:
#   ETHEREUM_RPC_URL, OPENROUTER_API_KEY, NUDGE_PUBLICATIONS_CONTRACT_ADDRESS,
#   IMPLICATION_GRAPH_NUDGER_PRIVATE_KEY, BRIDGE_CREATOR_PRIVATE_KEY, EXPLORER_CURATOR_PRIVATE_KEY,
#   CONTENT_FINDER_ATTESTER_FINDER_KEY, IMPLICATION_FINDER_ATTESTER_FINDER_KEY,
#   BELIEFS_CONTRACT_ADDRESS, IMPLICATIONS_CONTRACT_ADDRESS
# commonality-indexer: PONDER_CHAIN, PONDER_RPC_URL_84532 or PONDER_RPC_URL_1, START_BLOCK, all contract addresses
