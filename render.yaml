# Render deployment configuration for Commonality services
# See https://render.com/docs/blueprint-spec

databases:
  - name: commonality-indexer-db
    plan: basic-256mb
    postgresMajorVersion: 16

services:
  # Indexer
  - type: web
    name: commonality-indexer
    env: docker
    rootDir: indexer
    dockerContext: .
    dockerfilePath: Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PONDER_SCRIPT
        value: start
      - key: DATABASE_URL
        fromDatabase:
          name: commonality-indexer-db
          property: connectionString
      - key: DATABASE_SCHEMA
        value: public
      - key: PONDER_CHAIN
        sync: false  # Set in Render dashboard to sepolia or mainnet
      - key: PONDER_RPC_URL_11155111
        sync: false  # Set in Render dashboard for Sepolia deployments
      - key: PONDER_RPC_URL_1
        sync: false  # Set in Render dashboard for mainnet deployments
      - key: START_BLOCK
        sync: false  # Set to the contract deployment block
      - key: BELIEFS_CONTRACT_ADDRESS
        sync: false
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false
      - key: ASSURANCE_CONTRACT_FACTORY_ADDRESS
        sync: false
      - key: ERC1155_FACTORY_ADDRESS
        sync: false
      - key: MARKETPLACE_FACTORY_ADDRESS
        sync: false
      - key: DELEGATABLE_NOTES_ADDRESS
        sync: false
      - key: NOTE_INTENT_ADDRESS
        sync: false
      - key: ALIGNMENT_ATTESTATIONS_ADDRESS
        sync: false
      - key: MUTABLE_REF_UPDATER_ADDRESS
        sync: false
      - key: CONTENT_REGISTRY_ADDRESS
        sync: false
      - key: CHANNEL_REGISTRY_ADDRESS
        sync: false
      - key: CHANNEL_ESCROW_ADDRESS
        sync: false
      - key: CREATOR_CONTRACT_FACTORY_ADDRESS
        sync: false
    healthCheckPath: /graphql
    autoDeploy: true
    plan: standard

  # AI Attester Service
  - type: web
    name: commonality-attester
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: implication-attester/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: ATTESTER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: IPFS_API
        value: https://ipfs.io/api/v0  # Public IPFS gateway
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs  # Public IPFS gateway
      - key: X402_PAYMENT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: SERVICE_MARGIN_PERCENT
        value: 20
      - key: ETH_USD_PRICE
        value: 3000
      - key: GAS_PRICE_MULTIPLIER
        value: 1.2
      - key: ESTIMATED_INPUT_TOKENS
        value: 1000
      - key: ESTIMATED_OUTPUT_TOKENS
        value: 200
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 10
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Implication Graph Nudger
  - type: web
    name: commonality-implication-graph-nudger
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: implication-graph-nudger/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: NUDGER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: INDEXER_URL
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: IPFS_API
        value: https://ipfs.io/api/v0
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs
      - key: NUDGER_NAME
        value: Implication Graph Nudger
      - key: NUDGER_DESCRIPTION
        value: Suggests statements based on the implication graph
      - key: NUDGER_SOURCE_TYPE
        value: implication-graph
      - key: NUDGER_VERSION
        value: 0.1.0
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Content Attester Service
  - type: web
    name: commonality-content-attester
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: content-attester/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: ATTESTER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: ALIGNMENT_ATTESTATIONS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: ALIGNMENT_TOPIC_STATEMENT_CID
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: CONTENT_ATTESTER_NAME
        sync: false  # Set in Render dashboard (e.g. noninflammatory-neutral)
      - key: CONTENT_ATTESTER_PROMPT_TEMPLATE
        sync: false  # Set in Render dashboard
      - key: IPFS_API
        value: https://ipfs.io/api/v0
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs
      - key: X402_PAYMENT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: SERVICE_MARGIN_PERCENT
        value: 20
      - key: ETH_USD_PRICE
        value: 3000
      - key: GAS_PRICE_MULTIPLIER
        value: 1.2
      - key: ESTIMATED_INPUT_TOKENS
        value: 2500
      - key: ESTIMATED_OUTPUT_TOKENS
        value: 400
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 10
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Platform API Service (content-funding channel resolution + content-attester queuing)
  - type: web
    name: commonality-platform-api
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: platform-api-service/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set in Render dashboard (comma-separated origins or *)
      - key: COMMONALITY_TWITTER_HANDLE
        value: "@commonality"
      - key: CLAIM_PAGE_BASE_URL
        sync: false  # Set in Render dashboard
      - key: X_API_BEARER_TOKEN
        sync: false  # Set in Render dashboard (required for Twitter features)
      - key: YOUTUBE_API_KEY
        sync: false  # Set in Render dashboard (required for YouTube features)
      - key: VERIFIER_PRIVATE_KEY
        sync: false  # Set in Render dashboard (required for /verify/confirm)
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard (required for on-chain submission)
      - key: CHANNEL_REGISTRY_ADDRESS
        sync: false  # Set in Render dashboard (required for on-chain submission)
      - key: SUBMIT_VERIFICATION_TX
        value: "false"
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Bridge Creator Nudger
  - type: web
    name: commonality-bridge-creator
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: bridge-creator/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3003
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: NUDGER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: NUDGE_PUBLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: INDEXER_URL
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: IPFS_API
        value: https://ipfs.io/api/v0
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs
      - key: NUDGER_NAME
        value: Bridge Creator
      - key: NUDGER_DESCRIPTION
        value: Creates synthesized bridge statements from moderate positions
      - key: NUDGER_SOURCE_TYPE
        value: bridge-creator
      - key: NUDGER_VERSION
        value: 0.1.0
      - key: COMMONALITY_STATEMENTS
        sync: false  # Optional: comma-separated pre-configured commonality statement CIDs
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Explorer Curator Nudger
  - type: web
    name: commonality-explorer-curator
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: explorer-curator/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3004
      - key: ETHEREUM_RPC_URL
        sync: false  # Set in Render dashboard
      - key: NUDGER_PRIVATE_KEY
        sync: false  # Set in Render dashboard
      - key: NUDGE_PUBLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: INDEXER_URL
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false  # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: anthropic/claude-3.5-haiku
      - key: IPFS_API
        value: https://ipfs.io/api/v0
      - key: IPFS_GATEWAY
        value: https://ipfs.io/ipfs
      - key: NUDGER_NAME
        value: Fundable Project Explorer
      - key: NUDGER_DESCRIPTION
        value: Curates a map of fundable project areas and personalizes suggestions
      - key: NUDGER_SOURCE_TYPE
        value: explorer-curator
      - key: NUDGER_VERSION
        value: 0.1.0
      - key: EXPLORER_STREAM
        value: fundable-project-explorer
      - key: CURATOR_INTERVAL_MS
        value: 21600000  # 6 hours
    healthCheckPath: /health
    autoDeploy: true
    plan: standard

  # Content Finder (background worker)
  - type: worker
    name: commonality-content-finder
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: content-finder/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PLATFORM_API_URL
        sync: false  # Set in Render dashboard
      - key: ATTESTER_URL
        sync: false  # Set in Render dashboard
      - key: ATTESTER_FINDER_KEY
        sync: false  # Set in Render dashboard
      - key: SUBMISSIONS_API_URL
        sync: false  # Set in Render dashboard (optional; overrides file-based queue)
      - key: POLL_INTERVAL_MS
        value: 30000
    autoDeploy: true
    plan: standard

  # Implication Finder (background worker)
  - type: worker
    name: commonality-implication-finder
    env: docker
    rootDir: .
    dockerContext: .
    dockerfilePath: implication-finder/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: EVENT_CACHE_URL
        sync: false  # Set in Render dashboard
      - key: ATTESTER_URL
        sync: false  # Set in Render dashboard
      - key: ATTESTER_FINDER_KEY
        sync: false  # Set in Render dashboard
      - key: BELIEFS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: IMPLICATIONS_CONTRACT_ADDRESS
        sync: false  # Set in Render dashboard
      - key: IPFS_GATEWAY_URL
        value: https://ipfs.io/ipfs
      - key: POLL_INTERVAL_MS
        value: 30000
      - key: TOP_N_STATEMENTS
        value: 20
      - key: MIN_BELIEVER_THRESHOLD
        value: 2
    autoDeploy: true
    plan: standard

# Note: Deploy by pushing to your Git repository and connecting it to Render.
#
# Secrets to set in Render dashboard per service:
# implication-attester:  ETHEREUM_RPC_URL, ATTESTER_PRIVATE_KEY, IMPLICATIONS_CONTRACT_ADDRESS, OPENROUTER_API_KEY, X402_PAYMENT_ADDRESS
# implication-graph-nudger: ETHEREUM_RPC_URL, NUDGER_PRIVATE_KEY, IMPLICATIONS_CONTRACT_ADDRESS, INDEXER_URL, OPENROUTER_API_KEY
# content-attester: ETHEREUM_RPC_URL, ATTESTER_PRIVATE_KEY, ALIGNMENT_ATTESTATIONS_CONTRACT_ADDRESS, ALIGNMENT_TOPIC_STATEMENT_CID, OPENROUTER_API_KEY, X402_PAYMENT_ADDRESS, CONTENT_ATTESTER_NAME, CONTENT_ATTESTER_PROMPT_TEMPLATE
# platform-api-service: X_API_BEARER_TOKEN, YOUTUBE_API_KEY, VERIFIER_PRIVATE_KEY (+ optionally ETHEREUM_RPC_URL, CHANNEL_REGISTRY_ADDRESS if enabling on-chain submission)
# bridge-creator: ETHEREUM_RPC_URL, NUDGER_PRIVATE_KEY, NUDGE_PUBLICATIONS_CONTRACT_ADDRESS, INDEXER_URL, OPENROUTER_API_KEY
# explorer-curator: ETHEREUM_RPC_URL, NUDGER_PRIVATE_KEY, NUDGE_PUBLICATIONS_CONTRACT_ADDRESS, INDEXER_URL, OPENROUTER_API_KEY
# content-finder: PLATFORM_API_URL, ATTESTER_URL, ATTESTER_FINDER_KEY
# implication-finder: EVENT_CACHE_URL, ATTESTER_URL, ATTESTER_FINDER_KEY, BELIEFS_CONTRACT_ADDRESS, IMPLICATIONS_CONTRACT_ADDRESS
# commonality-indexer: PONDER_CHAIN, PONDER_RPC_URL_11155111 or PONDER_RPC_URL_1, START_BLOCK, all contract addresses
