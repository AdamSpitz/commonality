query GetAlignedSubjects($statementId: String!, $attester: String) {
  alignmentAttestationss(
    where: { statementId: $statementId, attester: $attester }
  ) {
    items {
      attester
      subjectAddress
      statementId
      createdAt
      blockNumber
    }
  }
}

query GetSubjectStatements($subjectAddress: String!, $attester: String) {
  alignmentAttestationss(
    where: { subjectAddress: $subjectAddress, attester: $attester }
  ) {
    items {
      attester
      subjectAddress
      statementId
      createdAt
      blockNumber
    }
  }
}

query GetAlignmentAttestation(
  $attester: String!
  $subjectAddress: String!
  $statementId: String!
) {
  alignmentAttestations(
    attester: $attester
    subjectAddress: $subjectAddress
    statementId: $statementId
  ) {
    attester
    subjectAddress
    statementId
    createdAt
    blockNumber
  }
}

query GetAlignmentsByAttester($attester: String!) {
  alignmentAttestationss(where: { attester: $attester }) {
    items {
      attester
      subjectAddress
      statementId
      createdAt
      blockNumber
    }
  }
}

query GetImplicationsToForFP($toStatementCid: String!, $attester: String) {
  implicationss(
    where: { toStatementCid: $toStatementCid, attester: $attester }
  ) {
    items {
      fromStatementCid
      attester {
        id
      }
    }
  }
}

query GetProjectTotalReceived($id: String!) {
  projects(id: $id) {
    totalReceived
  }
}

query GetProjectDetails($id: String!) {
  projects(id: $id) {
    id
    totalReceived
    threshold
    deadline
  }
}

query GetParticipantSummaries($projectAddress: String!) {
  participantSummariess(where: { projectAddress: $projectAddress }) {
    items {
      participant
      totalContributed
      totalRefunded
      netContribution
      contributionCount
      firstContributionAt
      lastContributionAt
    }
  }
}
