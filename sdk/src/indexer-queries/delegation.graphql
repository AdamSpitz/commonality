query GetNote($id: BigInt!) {
  delegatableNotes(id: $id) {
    id
    chainHash
    amount
    token
    tokenType
    tokenId
    owner
    rootOwner
    active
    parentNoteId
    createdAt
    createdAtBlock
    updatedAt
  }
}

query GetNotesByOwner($owner: String!) {
  delegatableNotess(where: { owner: $owner, active: true }) {
    items {
      id
      chainHash
      amount
      token
      tokenType
      tokenId
      owner
      rootOwner
      active
      parentNoteId
      createdAt
      createdAtBlock
      updatedAt
    }
  }
}

query GetNotesByRoot($rootOwner: String!) {
  delegatableNotess(where: { rootOwner: $rootOwner, active: true }) {
    items {
      id
      chainHash
      amount
      token
      tokenType
      tokenId
      owner
      rootOwner
      active
      parentNoteId
      createdAt
      createdAtBlock
      updatedAt
    }
  }
}

query GetDelegationChain($noteId: BigInt!) {
  delegationChainss(
    where: { noteId: $noteId }
    orderBy: "position"
    orderDirection: "asc"
  ) {
    items {
      address
      position
      createdAt
    }
  }
}
