query GetSaleListing($marketplaceAddress: String!, $listingId: BigInt!) {
  saleListingss(
    where: { marketplaceAddress: $marketplaceAddress, listingId: $listingId }
  ) {
    items {
      marketplaceAddress
      listingId
      seller
      tokenId
      originalCount
      remainingCount
      pricePerToken
      status
      createdAt
      updatedAt
    }
  }
}

query GetActiveSaleListings($marketplaceAddress: String!) {
