query GetProject($id: String!) {
  projects(id: $id) {
    id
    erc1155Address
    marketplaceAddress
    recipient
    threshold
    deadline
    totalReceived
    conditionAddress
    metadataCid
  }
}

query GetAllProjects {
  projectss {
    items {
      id
      erc1155Address
      marketplaceAddress
      recipient
      threshold
      deadline
      totalReceived
      conditionAddress
      metadataCid
      createdAt
    }
  }
}

query GetProjectsFiltered(
  $minDeadline: BigInt
  $maxDeadline: BigInt
  $minThreshold: BigInt
  $maxThreshold: BigInt
  $minTotalReceived: BigInt
  $maxTotalReceived: BigInt
  $orderBy: String
  $orderDirection: String
) {
  projectss(
    where: {
      deadline_gte: $minDeadline
      deadline_lte: $maxDeadline
      threshold_gte: $minThreshold
      threshold_lte: $maxThreshold
      totalReceived_gte: $minTotalReceived
      totalReceived_lte: $maxTotalReceived
    }
    orderBy: $orderBy
    orderDirection: $orderDirection
  ) {
    items {
      id
      erc1155Address
      marketplaceAddress
      recipient
      threshold
      deadline
      totalReceived
      conditionAddress
      metadataCid
      createdAtBlock
    }
  }
}

query GetProjectTokens($projectAddress: String!) {
  projectTokenss(where: { projectAddress: $projectAddress }) {
    items {
      projectAddress
      erc1155Address
      tokenId
      price
      createdAt
    }
  }
}

query GetProjectContributions($projectAddress: String!) {
  contributionss(where: { projectAddress: $projectAddress }) {
    items {
      id
      participant
      projectAddress
      erc1155Address
      tokenIds
      tokenCounts
      totalCost
      createdAt
      blockNumber
      transactionHash
    }
  }
}

