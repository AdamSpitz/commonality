version: '3.8'

services:
  # ============================================================================
  # Hardhat Node - Local Ethereum network
  # ============================================================================
  hardhat-node:
    build:
      context: ./hardhat
      dockerfile: Dockerfile
    container_name: commonality-hardhat-node
    ports:
      - "8545:8545"
    networks:
      - commonality-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    command: npx hardhat node --hostname 0.0.0.0

  # ============================================================================
  # Initialization Service - Deploys contracts and generates test data
  # ============================================================================
  init:
    build:
      context: ./hardhat
      dockerfile: Dockerfile
    container_name: commonality-init
    depends_on:
      hardhat-node:
        condition: service_healthy
    networks:
      - commonality-network
    environment:
      - HARDHAT_NETWORK=localhost
      - NUM_USERS=${NUM_USERS:-30}
      - NUM_ROUNDS=${NUM_ROUNDS:-5}
    volumes:
      # Mount a volume so we can extract contract addresses
      - contract-data:/app/deployment-output
    command: >
      sh -c "
        echo '=== Waiting for Hardhat node to be ready ===' &&
        sleep 5 &&
        echo '=== Running generative simulation ===' &&
        npx hardhat run --network localhost scripts/docker-init.js &&
        echo '=== Initialization complete ==='
      "

  # ============================================================================
  # Ponder Indexer - Indexes blockchain events and exposes GraphQL API
  # ============================================================================
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: commonality-indexer
    depends_on:
      init:
        condition: service_completed_successfully
    ports:
      - "42069:42069"
    networks:
      - commonality-network
    environment:
      # Database schema (required by Ponder)
      - DATABASE_SCHEMA=public

      # RPC endpoint (points to our local Hardhat node)
      - PONDER_RPC_URL_84532=http://hardhat-node:8545

      # Contract addresses (will be set by init script via shared volume)
      # These are placeholder values - the init script will write the actual values
      - BELIEFS_CONTRACT_ADDRESS=${BELIEFS_CONTRACT_ADDRESS}
      - IMPLICATIONS_CONTRACT_ADDRESS=${IMPLICATIONS_CONTRACT_ADDRESS}
      - PROJECT_ALIGNMENT_ADDRESS=${PROJECT_ALIGNMENT_ADDRESS}
      - DELEGATABLE_NOTES_ADDRESS=${DELEGATABLE_NOTES_ADDRESS}
      - ASSURANCE_CONTRACT_FACTORY_ADDRESS=${ASSURANCE_CONTRACT_FACTORY_ADDRESS}
      - ERC1155_FACTORY_ADDRESS=${ERC1155_FACTORY_ADDRESS}
      - MARKETPLACE_FACTORY_ADDRESS=${MARKETPLACE_FACTORY_ADDRESS}

      # Start indexing from block 0
      - START_BLOCK=0

      # Ponder port
      - PONDER_PORT=42069
    volumes:
      # Persist Ponder database so we don't re-sync on restart
      - ponder-data:/app/.ponder
      # Share contract addresses from init service
      - contract-data:/app/deployment-output:ro
    restart: unless-stopped
    # Override entrypoint to load contract addresses and start Ponder
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo '=== Waiting for contract deployment data ==='
        while [ ! -f /app/deployment-output/addresses.env ]; do
          echo 'Waiting for addresses.env...'
          sleep 2
        done
        echo '=== Loading contract addresses ==='
        set -a
        . /app/deployment-output/addresses.env
        set +a
        echo "Beliefs: $$BELIEFS_CONTRACT_ADDRESS"
        echo "Implications: $$IMPLICATIONS_CONTRACT_ADDRESS"
        echo "ProjectAlignment: $$PROJECT_ALIGNMENT_ADDRESS"
        echo "Database schema: $$DATABASE_SCHEMA"
        echo '=== Starting Ponder indexer ==='
        export DATABASE_SCHEMA=public
        exec npm run start

networks:
  commonality-network:
    driver: bridge

volumes:
  # Stores Ponder's SQLite database
  ponder-data:
    driver: local

  # Shared volume for contract addresses between init and indexer
  contract-data:
    driver: local
