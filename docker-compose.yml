services:
  # Hardhat local blockchain node
  hardhat-node:
    build:
      context: ./hardhat
      dockerfile: Dockerfile
    container_name: commonality-hardhat-node
    ports:
      - "8545:8545"
    volumes:
      # Mount project root so deploy script can write .env files
      - .:/workspace
    working_dir: /workspace/hardhat
    command: npx hardhat node --hostname 0.0.0.0
    healthcheck:
      test: |
        curl -f -X POST -H "Content-Type: application/json" \
        --data '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
        http://localhost:8545 || exit 1
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      - commonality

  # One-shot service to deploy contracts
  hardhat-deploy:
    build:
      context: ./hardhat
      dockerfile: Dockerfile
    container_name: commonality-hardhat-deploy
    volumes:
      # Mount project root so deploy script can write .env files
      - .:/workspace
    working_dir: /workspace/hardhat
    command: npx hardhat run scripts/deploy-local.js --network localhost
    depends_on:
      hardhat-node:
        condition: service_healthy
    environment:
      # Point to the hardhat-node service using Docker networking
      - HARDHAT_NETWORK_URL=http://hardhat-node:8545
    networks:
      - commonality

  # Local IPFS node for testing
  ipfs:
    image: ipfs/kubo:latest
    container_name: commonality-ipfs
    ports:
      - "5001:5001"  # API port
      - "8080:8080"  # Gateway port
    volumes:
      # Use ephemeral storage - fresh IPFS node each run
      - ipfs-data:/data/ipfs
    # Custom entrypoint to configure IPFS for path-based gateway (no subdomain redirects)
    # This prevents the gateway from redirecting to CID.ipfs.localhost which doesn't resolve
    entrypoint: >
      sh -c "
      ipfs init --profile=test || true &&
      ipfs config --json Gateway.PublicGateways '{\"localhost\": {\"Paths\": [\"/ipfs\", \"/ipns\"], \"UseSubdomains\": false}}' &&
      ipfs daemon --migrate=true
      "
    healthcheck:
      test: ["CMD-SHELL", "ipfs id || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s
    networks:
      - commonality

  # Ponder indexer service
  indexer:
    build:
      context: ./indexer
      dockerfile: Dockerfile
    container_name: commonality-indexer
    ports:
      - "42069:42069"
    volumes:
      # Mount project root to access .env file
      - .:/workspace
    working_dir: /app
    depends_on:
      hardhat-node:
        condition: service_healthy
      ipfs:
        condition: service_healthy
    environment:
      # Point to hardhat-node service
      - PONDER_RPC_URL_31337=http://hardhat-node:8545
      # Use ephemeral in-memory database for tests (fresh state each run)
      - PONDER_EPHEMERAL=true
      # Point to local IPFS gateway
      - IPFS_GATEWAY=http://ipfs:8080/ipfs
      - IPFS_API=http://ipfs:5001
    # Load contract addresses from .env file
    env_file:
      - .env
    healthcheck:
      test: |
        curl -f -X POST -H "Content-Type: application/json" \
        --data '{"query":"{ _meta { block { number } } }"}' \
        http://localhost:42069/graphql || exit 1
      interval: 2s
      timeout: 10s
      retries: 30
      start_period: 10s
    networks:
      - commonality

networks:
  commonality:
    driver: bridge

volumes:
  ipfs-data:
